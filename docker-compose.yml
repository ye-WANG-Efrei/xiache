version: "3.9"

# ---------------------------------------------------------------------------
# xiache — self-hostable agent skill registry
# ---------------------------------------------------------------------------

services:
  # ── PostgreSQL 16 + pgvector ──────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: xiache-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: xiache
      POSTGRES_USER: xiache
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xiache}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./backend/migrations/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xiache -d xiache"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: xiache-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://xiache:${POSTGRES_PASSWORD:-xiache}@postgres:5432/xiache
      STORAGE_PATH: /data/artifacts
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      EMBEDDING_API_BASE: ${EMBEDDING_API_BASE:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-1536}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      XIACHE_DEV_MODE: ${XIACHE_DEV_MODE:-true}
      DEV_API_KEY: ${DEV_API_KEY:-dev-key-for-testing}
      CORS_ORIGINS: ${CORS_ORIGINS:-["http://localhost:3000","http://frontend:3000"]}
    volumes:
      - artifact_data:/data/artifacts
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Frontend (Next.js) ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: http://backend:8000
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: xiache-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_API_KEY: ${NEXT_PUBLIC_API_KEY:-dev-key-for-testing}
      NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  postgres_data:
    name: xiache_postgres_data
  artifact_data:
    name: xiache_artifact_data
